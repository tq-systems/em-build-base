.before-script-docker-login:
  before_script:
    - docker login $CI_REGISTRY -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD

# A dedicated runner is used so that images do not need to be synchronized across different runners
.docker-build:
  extends:
    - .image-docker
    - .before-script-docker-login
    - .gitlab-runner-tag
  variables:
    GITLAB_RUNNER_TAG: 'tq-em-docker'
